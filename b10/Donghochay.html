<!doctype html>
<html>
  <head>
    <title>Đồng hồ chạy</title>
  </head>
  <body>
    <p id="clock"></p>

    <script>
      function showTime() {
        let now = new Date();

        let time =
          now.getHours() + ":" + now.getMinutes() + ":" + now.getSeconds();

        document.getElementById("clock").innerHTML = time;
      }

      setInterval(showTime, 1000);

      showTime();
    </script>
  </body>
</html>
