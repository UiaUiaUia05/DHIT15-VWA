<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sử dụng alert(), confirm(), prompt()</title>
</head>
<body>
    <h1>Sử dụng alert(), confirm(),prompt()</h1>
    <hr>
    <script>
        var name = prompt("Nhập tên của bạn");
        alert("Xin chào" + name);
        var check = confirm("Bạn có muốn tiếp tục không?");
        if (check){
            alert("bạn đã chọn YES");
        } else{
            alert("bạn đã chọn NO");
        }
    </script>
</body>
</html>
