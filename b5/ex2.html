<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex2</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }

      .box {
        width: 300px;
        height: 300px;
        background-color: greenyellow;
        position: relative;
      }

      .badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: red;
        color: white;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Arial, sans-serif;
        font-weight: bold;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="badge">NEW</div>
    </div>
  </body>
</html>
