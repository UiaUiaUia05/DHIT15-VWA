<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex7</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 50px 0;
      }

      .navbar {
        background-color: #111;
        display: flex;
        justify-content: center;
        padding: 15px 0;
      }

      .nav-list {
        list-style-type: none;
        margin: 0;
        padding: 0;
        display: flex;
        gap: 15px;
      }

      .nav-list a {
        color: #fff;
        text-decoration: none;
        padding: 5px 10px;
        border-radius: 8px;
        font-size: 16px;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      .nav-list a:hover,
      .nav-list a.active {
        background-color: #ffcc00;
        color: #000;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <ul class="nav-list">
        <li><a href="#" class="active">Trang chủ</a></li>
        <li><a href="#">Giới thiệu</a></li>
        <li><a href="#">Khóa học</a></li>
        <li><a href="#">Bài viết</a></li>
        <li><a href="#">Liên hệ</a></li>
      </ul>
    </nav>
  </body>
</html>
