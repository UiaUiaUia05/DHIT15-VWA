<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex4</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        margin-top: 50px;
        font-family: Arial, sans-serif;
      }

      .container {
        position: relative;
        width: 550px;
        height: 350px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.4);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
      }

      .overlay h2 {
        margin: 0 0 15px 0;
        font-size: 28px;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
      }

      .overlay p {
        margin: 0 0 25px 0;
        font-size: 16px;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
      }

      .btn {
        padding: 10px 30px;
        border: 2px solid white;
        background: transparent;
        color: white;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .btn:hover {
        background-color: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="e6090105-bien-da-nang-thumb.jpg" alt="Đà Nẵng" />
      <div class="overlay">
        <h2>Du lịch Đà Nẵng</h2>
        <p>Biển xanh – nắng vàng – trải nghiệm tuyệt vời</p>
        <button class="btn">Xem thêm</button>
      </div>
    </div>
  </body>
</html>
