<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex5</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }

      .product-card {
        position: relative;
        width: 250px;
        border: 1px solid #eaeaea;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        background-color: white;
      }

      .sale-badge {
        position: absolute;
        top: 15px;
        right: 15px;
        background-color: #e74c3c;
        color: white;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: bold;
        border-radius: 4px;
      }

      .product-image {
        width: 100%;
        display: block;
        margin-bottom: 20px;
      }

      .product-name {
        font-size: 16px;
        font-weight: bold;
        color: #333;
        margin: 0 0 10px 0;
      }

      .product-price {
        font-size: 16px;
        font-weight: bold;
        color: #e74c3c;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="product-card">
      <div class="sale-badge">SALE</div>
      <img src="BS2815.jpg" alt="Áo Thun Cổ Trụ" class="product-image" />
      <h3 class="product-name">Áo Thun Cổ Trụ</h3>
      <p class="product-price">250.000đ</p>
    </div>
  </body>
</html>
