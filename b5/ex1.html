<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex1</title>
    <style>
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-top: 50px;
      }

      .color-box {
        width: 200px;
        height: 50px;
        border: 2px solid black;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        padding-left: 10px;
        font-family: Arial, sans-serif;
        font-size: 16px;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease,
          opacity 0.3s ease;
      }

      #div-1 {
        background-color: red;
      }
      #div-2 {
        background-color: green;
      }
      #div-3 {
        background-color: blue;
      }
      #div-4 {
        background-color: yellow;
      }

      .color-box:hover {
        transform: scale(1.05);
        box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.4);
        opacity: 0.9;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="color-box" id="div-1">div-1</div>
      <div class="color-box" id="div-2">div-2</div>
      <div class="color-box" id="div-3">div-3</div>
      <div class="color-box" id="div-4">div-4</div>
    </div>
  </body>
</html>
