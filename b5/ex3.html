<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex3</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
      }

      .top-line {
        width: 100%;
        height: 8px;
        background-color: black;
        margin-bottom: 5px;
      }

      .navbar {
        list-style-type: none;
        margin: 0;
        margin-left: 50px;
        padding: 0;
        background-color: #333;
        display: flex;
        width: 450px;
      }

      .navbar > li {
        position: relative;
        flex: 1;
        text-align: center;
      }

      .navbar > li > a {
        display: block;
        color: white;
        text-decoration: none;
        padding: 15px 20px;
      }

      .navbar > li:hover > a {
        background-color: #555;
      }

      .dropdown-menu {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 150px;
        box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.1);
        padding: 0;
        margin: 0;
        list-style-type: none;
        top: 100%;
        left: 0;
      }

      .dropdown-menu li a {
        color: #333;
        padding: 15px 20px;
        text-decoration: none;
        display: block;
        text-align: left;
      }

      .dropdown-menu li a:hover {
        color: blue;
      }

      .navbar > li:hover .dropdown-menu {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="top-line"></div>

    <ul class="navbar">
      <li><a href="#">Trang chủ</a></li>
      <li>
        <a href="#">Sản phẩm</a>
        <ul class="dropdown-menu">
          <li><a href="#">Laptop</a></li>
          <li><a href="#">Điện thoại</a></li>
          <li><a href="#">Phụ kiện</a></li>
        </ul>
      </li>
      <li><a href="#">Liên hệ</a></li>
    </ul>
  </body>
</html>
