<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex9</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 50px;
      }

      .main-menu {
        list-style: none;
        margin: 0;
        padding: 0;
        background: linear-gradient(#4a4a4a, #2b2b2b);
        border-radius: 5px;
        display: flex;
        width: max-content;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }

      .main-menu > li {
        position: relative;
        border-right: 1px solid #1a1a1a;
        border-left: 1px solid #555;
      }

      .main-menu > li:first-child {
        border-left: none;
        border-top-left-radius: 5px;
        border-bottom-left-radius: 5px;
      }

      .main-menu > li:last-child {
        border-right: none;
        border-top-right-radius: 5px;
        border-bottom-right-radius: 5px;
      }

      .main-menu > li > a {
        display: block;
        padding: 15px 25px;
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        font-weight: bold;
      }

      .main-menu > li:hover > a,
      .main-menu > li.active > a {
        color: #76c34a;
      }

      .sub-menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        background-color: #222;
        list-style: none;
        padding: 0;
        margin: 0;
        min-width: 180px;
        border-radius: 0 0 5px 5px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }

      .main-menu > li:hover .sub-menu {
        display: block;
      }

      .sub-menu li {
        border-bottom: 1px solid #111;
        border-top: 1px solid #333;
      }

      .sub-menu li:last-child {
        border-bottom: none;
      }

      .sub-menu a {
        display: block;
        padding: 12px 20px;
        color: #fff;
        text-decoration: none;
        font-size: 14px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 15px;
      }

      .sub-menu a i {
        color: #76c34a;
        width: 16px;
        text-align: center;
      }

      .sub-menu a:hover {
        background-color: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <ul class="main-menu">
      <li><a href="#">Trang chủ</a></li>
      <li class="active">
        <a href="#">Sản phẩm</a>
        <ul class="sub-menu">
          <li>
            <a href="#"><i class="fa-regular fa-file-lines"></i> CSS3</a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-comment"></i> HTML5</a>
          </li>
          <li>
            <a href="#"><i class="fa-solid fa-chevron-right"></i> PHP</a>
          </li>
        </ul>
      </li>
      <li><a href="#">Dịch vụ</a></li>
      <li><a href="#">Giới thiệu</a></li>
      <li><a href="#">Liên hệ</a></li>
    </ul>
  </body>
</html>
