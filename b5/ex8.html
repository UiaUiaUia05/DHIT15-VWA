<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab03-ex8</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f5f5f5;
      }

      .main-container {
        padding: 20px;
      }

      .product-card {
        width: 320px;
        background-color: #fff;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .card-border {
        border: 2px solid #ffcc00;
        border-radius: 10px;
        padding: 15px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        box-sizing: border-box;
      }

      .product-image {
        max-width: 100%;
        height: auto;
        margin-bottom: 20px;
      }

      .product-name {
        font-size: 18px;
        font-weight: bold;
        color: #333;
        text-align: center;
        margin: 0 0 10px 0;
        line-height: 1.4;
      }

      .product-price {
        font-size: 20px;
        font-weight: bold;
        color: #e74c3c;
        text-align: center;
        margin: 0 0 20px 0;
      }

      .buy-button {
        background-color: #000;
        color: #fff;
        padding: 10px 30px;
        border: none;
        border-radius: 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .buy-button:hover {
        background-color: #333;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="product-card">
        <div class="card-border">
          <img
            src="alienware-16-aurora-2025-1752812369.jpeg"
            alt="Dell Alienware Laptop"
            class="product-image"
          />
          <h3 class="product-name">Dell Alienware 16 Aurora (2025)</h3>
          <p class="product-price">39.690.000đ</p>
          <button class="buy-button">Mua ngay</button>
        </div>
      </div>
    </div>
  </body>
</html>
