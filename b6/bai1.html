<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo menu ngang</title>
<style>
    .nav-menu{
        list-style-type: none;
        margin: 0;
        padding: 0;
        background-color: #cccccc;
        overflow: hidden;
        display: inline-flex;
    }
    .nav-menu li{
        border-right: 1px solid red;
    }
    .nav-menu li{
        border-right: none;
    }
    .nav-menu li a{
        display: block;
        color: #333;
        text-align: center;
        padding: 10px 20px;
        text-decoration: none;
        font-family: Arial, sans-serif;
    }
    .nav-menu li a:hover{
        background-color: green;
        color: white;
    }
</style>

</head>
<body>
    <h2 style="color: orange"> Tạo menu ngang</h2>
    <ul class="nav-menu">
        <li><a href="#">Trang chủ</a></li>
        <li><a href="#">Sản phẩm</a></li>
        <li><a href="#">Dịch vụ</a></li>
        <li><a href="#">Hỗ trợ</a></li>
        <li><a href="#">Liên hệ</a></li>
    </ul>
</body>
</html>
