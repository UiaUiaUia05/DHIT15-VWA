<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài 4: Menu dọc có Icon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        .nav-vertical {
            list-style: none;
            padding: 0;
            margin: 20px;
            width: 280px;
            border: 2px solid black;
            font-family: Arial, sans-serif;
        }

        /* Ô tiêu đề DANH MỤC */
        .nav-vertical .header {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: white;
            color: black;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 2px solid black;
            text-transform: uppercase;
        }

        .nav-vertical .header i {
            color: red; /* Icon 3 gạch màu đỏ */
            margin-right: 15px;
            font-size: 22px;
        }

        /* Định dạng các mục menu con */
        .nav-vertical li a {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            color: #333;
            background-color: white;
            border-bottom: 1px solid red; /* Vạch kẻ đỏ giữa các mục */
            transition: 0.3s;
        }

        .nav-vertical li:last-child a {
            border-bottom: none;
        }

        /* Định dạng Icon trong menu */
        .nav-vertical li a img, 
        .nav-vertical li a i.menu-icon {
            width: 30px;
            margin-right: 15px;
            text-align: center;
            font-size: 20px;
            color: #444; /* Màu icon mặc định */
        }

        /* Mũi tên > nằm bên phải (ẩn mặc định) */
        .arrow {
            margin-left: auto; /* Đẩy mũi tên về sát bên phải */
            display: none;
        }

        /* HIỆU ỨNG HOVER */
        .nav-vertical li a:hover {
            background-color: red; /* Nền đỏ khi hover */
            color: white;          /* Chữ trắng */
        }

        .nav-vertical li a:hover i.menu-icon {
            color: white;          /* Icon đổi sang trắng */
        }

        .nav-vertical li a:hover .arrow {
            display: block;        /* Hiện mũi tên khi hover */
        }

    </style>
</head>
<body>

    <ul class="nav-vertical">
        <li class="header">
            <i class="fa-solid fa-bars"></i> DANH MỤC
        </li>
        <li>
            <a href="#">
                <i class="fa-solid fa-house-chimney menu-icon" style="color: #3498db;"></i>
                Trang chủ
                <span class="arrow">></span>
            </a>
        </li>
        <li>
            <a href="#">
                <i class="fa-solid fa-store menu-icon" style="color: #2ecc71;"></i>
                Sản phẩm
                <span class="arrow">></span>
            </a>
        </li>
        <li>
            <a href="#">
                <i class="fa-solid fa-briefcase menu-icon" style="color: #e74c3c;"></i>
                Dịch vụ
                <span class="arrow">></span>
            </a>
        </li>
        <li>
            <a href="#">
                <i class="fa-solid fa-screwdriver-wrench menu-icon" style="color: #555;"></i>
                Hỗ trợ
                <span class="arrow">></span>
            </a>
        </li>
        <li>
            <a href="#">
                <i class="fa-solid fa-envelope menu-icon" style="color: #e67e22;"></i>
                Liên hệ
                <span class="arrow">></span>
            </a>
        </li>
    </ul>

</body>
</html>
